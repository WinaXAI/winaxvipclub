<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WinaX VIP Club | Smart Onboarding</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0B0B0F 0%, #0A1F44 100%);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 0;
      pointer-events: none;
    }

    .bg-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, rgba(212, 175, 55, 0) 70%);
      border-radius: 50%;
      animation: float 20s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0px) translateX(0px) scale(1); opacity: 0.2; }
      50% { transform: translateY(-40px) translateX(25px) scale(1.1); opacity: 0.4; }
      100% { transform: translateY(0px) translateX(0px) scale(1); opacity: 0.2; }
    }

    .app-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
    }

    .progress-area {
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      padding: 0.5rem 1rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .progress-steps {
      font-size: 0.8rem;
      font-weight: 600;
      color: #FFFFFF;
      letter-spacing: 0.5px;
    }

    .progress-steps span {
      color: #D4AF37;
    }

    .progress-bar-bg {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #D4AF37, #FFD700);
      border-radius: 8px;
      transition: width 0.3s ease;
    }

    .card {
      background: rgba(15, 15, 20, 0.92);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      padding: 2rem 1.8rem;
      animation: fadeSlideIn 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #FFFFFF, #D4AF37);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 0.8rem;
      background: linear-gradient(135deg, #FFFFFF, #D4AF37);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
    }

    .gold-badge {
      background: rgba(212, 175, 55, 0.2);
      border: 1px solid #D4AF37;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #D4AF37;
      display: inline-block;
      margin: 0.75rem 0 0.5rem;
      letter-spacing: 0.5px;
    }

    .subtitle {
      color: #B8C1EC;
      font-size: 1rem;
      margin: 0.5rem 0 1rem;
      line-height: 1.4;
    }

    p, li, span, label {
      color: #FFFFFF;
      line-height: 1.5;
    }

    .text-secondary {
      color: #B8C1EC;
    }

    .text-gold {
      color: #D4AF37;
    }

    small {
      color: #B8C1EC;
      display: block;
      margin: 0.5rem 0;
    }

    input, select {
      width: 100%;
      padding: 1rem;
      margin: 0.6rem 0;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 1rem;
      color: #FFFFFF !important;
      font-size: 1rem;
      outline: none;
    }

    input::placeholder {
      color: #B8C1EC !important;
      opacity: 0.8;
    }

    select {
      color: #FFFFFF !important;
      cursor: pointer;
    }

    select option {
      background: #0B0B0F;
      color: #FFFFFF;
    }

    input:focus, select:focus {
      border-color: #D4AF37;
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.3);
    }

    .btn {
      width: 100%;
      padding: 1rem;
      border-radius: 3rem;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 1rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, #D4AF37, #FFD700);
      color: #000000;
      font-weight: 800;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .btn-primary:hover {
      transform: scale(1.02);
      background: linear-gradient(135deg, #E5C45A, #FFE44D);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #FFFFFF;
      margin-top: 0.7rem;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .flex-btns {
      display: flex;
      gap: 1rem;
      margin-top: 0.8rem;
      flex-wrap: wrap;
    }
    .flex-btns .btn {
      flex: 1;
      margin-top: 0;
    }

    .option-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin: 1rem 0;
    }

    .clickable-option {
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 2rem;
      padding: 0.7rem 1.2rem;
      font-size: 0.85rem;
      cursor: pointer;
      color: #FFFFFF !important;
      font-weight: 500;
      transition: all 0.2s;
    }

    .clickable-option.selected {
      background: linear-gradient(135deg, #D4AF37, #B8860B);
      color: #000000 !important;
      border-color: #D4AF37;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.4);
    }

    .broker-card, .plan-card {
      background: rgba(0, 0, 0, 0.6);
      border-radius: 1.2rem;
      padding: 1.2rem;
      margin-bottom: 1.2rem;
      border-left: 4px solid #D4AF37;
    }

    .broker-card strong, .plan-card strong {
      color: #D4AF37;
      font-size: 1.1rem;
      display: block;
      margin-bottom: 0.3rem;
    }

    .broker-card span, .plan-card span {
      color: #B8C1EC;
      font-size: 0.85rem;
    }

    .plan-benefits {
      margin: 0.8rem 0;
      padding-left: 1.2rem;
    }
    .plan-benefits li {
      color: #B8C1EC;
      font-size: 0.8rem;
      margin: 0.3rem 0;
    }

    .price-duration {
      display: inline-block;
      background: rgba(212, 175, 55, 0.15);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.7rem;
      color: #D4AF37;
      margin-left: 0.5rem;
    }

    .info-note {
      background: rgba(0, 0, 0, 0.7);
      border-left: 4px solid #D4AF37;
      padding: 1rem;
      border-radius: 1rem;
      margin: 1rem 0;
    }

    .info-note p {
      color: #FFFFFF;
    }

    .copy-box {
      background: rgba(0, 0, 0, 0.8);
      padding: 0.8rem;
      border-radius: 1rem;
      font-family: monospace;
      margin: 0.8rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .copy-box span {
      color: #D4AF37;
      word-break: break-all;
      font-size: 0.85rem;
    }

    .copy-btn {
      background: #D4AF37;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-weight: bold;
      cursor: pointer;
      color: #000000;
    }

    .back-link {
      color: #B8C1EC;
      text-align: center;
      margin-top: 1.2rem;
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: underline;
      display: inline-block;
    }

    .reset-link {
      text-align: right;
      font-size: 0.7rem;
      margin-top: 1rem;
      color: #B8C1EC;
      cursor: pointer;
      opacity: 0.8;
    }

    footer {
      text-align: center;
      font-size: 0.7rem;
      margin-top: 1.5rem;
      color: #B8C1EC;
    }

    @media (max-width: 550px) {
      body { padding: 1rem; }
      .card { padding: 1.5rem; }
      h1 { font-size: 1.6rem; }
      h2 { font-size: 1.3rem; }
      .flex-btns { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="bg-particles" id="particles"></div>
<div class="app-container">
  <div class="progress-area">
    <div class="progress-steps">Step <span id="currentStepSpan">1</span> / <span id="totalStepsSpan">10</span></div>
    <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div id="cardContainer"></div>
  <div class="reset-link" id="resetAllBtn">⟳ Reset & Start Over</div>
  <footer>WinaX VIP Club | Free Lifetime Signals Through Verified Partner Registration</footer>
</div>

<script>
  // ========== STATE ==========
  let currentCard = 0;
  let userData = {
    name: "",
    whatsapp: "",
    accessType: null,
    selectedInterests: [],
    brokerChoice: null,
    isNewAccount: null,
    depositInfo: { brokerUsed: "", accountNumber: "", depositAmount: "", experience: "" },
    selectedPlan: null,
    selectedPlanPrice: null,
    selectedPlanUrl: null
  };

  // Broker DB
  const BROKERS = {
    deriv: { name: "Deriv", desc: "Forex, Gold & Synthetic Indices", link: "https://track.deriv.com/_OmyJhs4k4vL1k0YPxVS0A2Nd7ZgqdRLk/1/", existingType: "link", instructions: "Contact support via live chat and say: 'Please change my IB partner to this link for education and trading guidance.' Then provide this link:" },
    xm: { name: "XM Global", desc: "Best for Forex and Gold", link: "https://affs.click/ree2T", existingCode: "2JTDV", existingType: "code", instructions: "Create a new MT4 or MT5 trading account and apply this partner code:" },
    exness: { name: "Exness", desc: "Best for Forex and Gold", link: "https://one.exnesstrack.org/a/plds1gh2vg", existingType: "link", instructions: "Contact support via live chat and say: 'Please change my IB partner to this link for education and trading guidance.' Then provide this link:" },
    weltrade: { name: "Weltrade", desc: "Forex & Synthetic Indices", link: "https://track.gowt.me/visit/?bta=42373&brand=weltrade", existingType: "link", instructions: "Contact support via live chat and say: 'Please change my IB partner to this link for education and trading guidance.' Then provide this link:" }
  };

  // Plans DB with benefits and 4-month duration
  const PLANS = {
    forex: { 
      name: "Forex & Gold VIP", 
      price: "$150", 
      duration: "4 months",
      url: "https://www.paypal.com/ncp/payment/3U5GY8KFBP6ZL",
      benefits: [
        "Forex pairs (EURUSD, GBPUSD, USDJPY)",
        "Gold signals",
        "NAS100 & US30 signals",
        "Crypto (Bitcoin) signals",
        "5-20 accurate signals per week",
        "+85% Accuracy rate",
        "1-on-1 trading guidance & support",
        "Trading & risk management tips",
        "24/7 support"
      ]
    },
    deriv: { 
      name: "Deriv Synthetic Indices VIP", 
      price: "$150", 
      duration: "4 months",
      url: "https://www.paypal.com/ncp/payment/ZHQY9QH7SNBKQ",
      benefits: [
        "Deriv Synthetic Indices signals (Volatility, Boom & Crash)",
        "5-20 accurate signals per week",
        "+85% Accuracy rate",
        "1-on-1 trading guidance & support",
        "Trading & risk management tips",
        "24/7 support"
      ]
    },
    weltrade: { 
      name: "Weltrade Synthetic Indices VIP", 
      price: "$150", 
      duration: "4 months",
      url: "https://www.paypal.com/ncp/payment/7SDD8KLDUFKS6",
      benefits: [
        "Weltrade Synthetic Indices signals (FX Vol 20, GainX 600)",
        "5-20 accurate signals per week",
        "+85% Accuracy rate",
        "1-on-1 trading guidance & support",
        "Trading & risk management tips",
        "24/7 support"
      ]
    },
    all: { 
      name: "All VIP Groups", 
      price: "$250", 
      duration: "4 months",
      url: "https://www.paypal.com/ncp/payment/3MJH6L36YMBVS",
      benefits: [
        "All signals from Forex & Gold VIP group",
        "All signals from Deriv Synthetic Indices VIP group",
        "All signals from Weltrade Synthetic Indices VIP group",
        "5-20 accurate signals per week (per group)",
        "+85% Accuracy rate across all signals",
        "1-on-1 trading guidance & support",
        "Trading & risk management tips",
        "24/7 support"
      ]
    }
  };

  // Crypto addresses
  const CRYPTO = {
    usdt: "TWTBRCLzGYsd516QGQgayq4EAVfCNm6Y8S",
    btc: "1EW2XTbbERBgr8haUyJNcQbNmBaFwRJruk",
    eth: "0x3fB34Ee13180AF792716c5278bf695eb1ce66b7e"
  };

  // Google Sheets URL (replace with your Apps Script URL)
  const GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec";

  // ========== HELPER FUNCTIONS ==========
  function saveProgress() {
    localStorage.setItem("winaXUserData", JSON.stringify(userData));
    localStorage.setItem("winaXCurrentCard", currentCard);
  }

  function loadProgress() {
    const saved = localStorage.getItem("winaXUserData");
    if (saved) { try { Object.assign(userData, JSON.parse(saved)); } catch(e) {} }
    const savedCard = localStorage.getItem("winaXCurrentCard");
    if (savedCard && !isNaN(parseInt(savedCard))) { currentCard = parseInt(savedCard); if (currentCard < 0) currentCard = 0; if (currentCard > 9) currentCard = 9; }
  }

  function resetAll() {
    if (confirm("Reset all progress? Your data will be cleared.")) {
      localStorage.removeItem("winaXUserData");
      localStorage.removeItem("winaXCurrentCard");
      userData = { name: "", whatsapp: "", accessType: null, selectedInterests: [], brokerChoice: null, isNewAccount: null, depositInfo: { brokerUsed: "", accountNumber: "", depositAmount: "", experience: "" }, selectedPlan: null, selectedPlanPrice: null, selectedPlanUrl: null };
      currentCard = 0;
      render();
    }
  }

  function updateProgress() {
    let stepNum = currentCard + 1;
    document.getElementById("currentStepSpan").innerText = stepNum;
    const percent = ((stepNum-1)/9) * 100;
    document.getElementById("progressFill").style.width = percent + "%";
  }

  function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

  async function submitToGoogleSheets() {
    const data = {
      name: userData.name,
      whatsapp: userData.whatsapp,
      accessType: userData.accessType,
      interests: userData.selectedInterests.join(", "),
      brokerUsed: userData.depositInfo.brokerUsed,
      accountNumber: userData.depositInfo.accountNumber,
      depositAmount: userData.depositInfo.depositAmount,
      experience: userData.depositInfo.experience,
      selectedPlan: userData.selectedPlan,
      timestamp: new Date().toISOString()
    };
    try { await fetch(GOOGLE_SHEETS_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) }); } catch(e) { console.log(e); }
  }

  function getRecommendedBrokers() {
    const interests = userData.selectedInterests;
    const hasDeriv = interests.some(i => i.includes("Deriv Synthetic"));
    const hasWeltrade = interests.some(i => i.includes("Weltrade Synthetic"));
    const hasForexGold = interests.some(i => i.includes("Forex") || i.includes("Gold") || i.includes("NAS100") || i.includes("Crypto"));
    if (hasDeriv && !hasWeltrade) return { brokers: ["deriv"], message: "You selected Deriv Synthetic Indices. Deriv is the required broker." };
    if (hasWeltrade && !hasDeriv) return { brokers: ["weltrade"], message: "You selected Weltrade Synthetic Indices. Weltrade is the required broker." };
    if (hasDeriv && hasWeltrade) return { brokers: ["deriv", "weltrade"], message: "You selected both synthetic indices. Register with both brokers below." };
    if (hasForexGold) return { brokers: ["deriv", "xm", "exness", "weltrade"], message: "For Forex, Gold, Indices and Crypto, choose any regulated broker." };
    return { brokers: ["deriv", "xm", "exness"], message: "Please choose a regulated broker below." };
  }

  // ========== RENDER ==========
  function render() {
    updateProgress();
    const container = document.getElementById("cardContainer");
    let html = "";
    if (currentCard === 0) html = renderWelcome();
    else if (currentCard === 1) html = renderUserInfo();
    else if (currentCard === 2) html = renderAccessType();
    else if (currentCard === 3 && userData.accessType === "free") html = renderInterests();
    else if (currentCard === 4 && userData.accessType === "free") html = renderBrokerSelection();
    else if (currentCard === 5 && userData.accessType === "free" && userData.isNewAccount === true) html = renderNewAccountConfirmation();
    else if (currentCard === 5 && userData.accessType === "free" && userData.isNewAccount === false) html = renderExistingInstructions();
    else if (currentCard === 6 && userData.accessType === "free") html = renderDepositForm();
    else if (currentCard === 7 && userData.accessType === "free") html = renderFinalScreen();
    else if (currentCard === 3 && userData.accessType === "paid") html = renderPlanSelection();
    else if (currentCard === 4 && userData.accessType === "paid") html = renderPaymentMethods();
    else if (currentCard === 5 && userData.accessType === "paid") html = renderPaidFinalScreen();
    container.innerHTML = html;
    attachEvents();
    scrollToTop();
    saveProgress();
  }

  function attachEvents() {
    if (currentCard === 0) document.getElementById("startBtn")?.addEventListener("click", () => { currentCard = 1; render(); });
    if (currentCard === 1) {
      document.getElementById("continueInfoBtn")?.addEventListener("click", () => {
        let name = document.getElementById("fullName")?.value.trim();
        let wa = document.getElementById("whatsappNum")?.value.trim();
        if (!name || !wa) { alert("Please enter Full Name and WhatsApp number."); return; }
        if (!/^\+\d{7,15}$/.test(wa)) { alert("WhatsApp must start with +. Example: +264812345678"); return; }
        userData.name = name; userData.whatsapp = wa;
        currentCard = 2; render();
      });
      document.getElementById("backInfo")?.addEventListener("click", () => { currentCard--; render(); });
    }
    if (currentCard === 2) {
      document.getElementById("freeAccessBtn")?.addEventListener("click", () => { userData.accessType = "free"; currentCard = 3; render(); });
      document.getElementById("paidAccessBtn")?.addEventListener("click", () => { userData.accessType = "paid"; currentCard = 3; render(); });
      document.getElementById("backAccess")?.addEventListener("click", () => { currentCard--; render(); });
    }
    if (currentCard === 3 && userData.accessType === "free") {
      document.querySelectorAll(".interest-option").forEach(opt => {
        opt.addEventListener("click", () => {
          const val = opt.getAttribute("data-value");
          if (userData.selectedInterests.includes(val)) userData.selectedInterests = userData.selectedInterests.filter(i => i !== val);
          else userData.selectedInterests.push(val);
          render();
        });
      });
      document.getElementById("continueInterestsBtn")?.addEventListener("click", () => { if (userData.selectedInterests.length === 0) { alert("Select at least one interest."); return; } currentCard = 4; render(); });
      document.getElementById("backInterests")?.addEventListener("click", () => { currentCard = 2; render(); });
    }
    if (currentCard === 4 && userData.accessType === "free") {
      document.querySelectorAll(".broker-reg").forEach(btn => {
        btn.addEventListener("click", () => { 
          userData.brokerChoice = btn.dataset.broker; 
          userData.isNewAccount = true;
          window.open(btn.dataset.link, "_blank"); 
          currentCard = 5; render(); 
        });
      });
      document.querySelectorAll(".broker-existing").forEach(btn => {
        btn.addEventListener("click", () => { 
          userData.brokerChoice = btn.dataset.broker; 
          userData.isNewAccount = false;
          currentCard = 5; render(); 
        });
      });
      document.getElementById("backBroker")?.addEventListener("click", () => { currentCard--; render(); });
    }
    if (currentCard === 5 && userData.accessType === "free" && userData.isNewAccount === true) {
      document.getElementById("newAccountContinue")?.addEventListener("click", () => { currentCard = 6; render(); });
      document.getElementById("backNewAccount")?.addEventListener("click", () => { currentCard = 4; render(); });
    }
    if (currentCard === 5 && userData.accessType === "free" && userData.isNewAccount === false) {
      document.querySelectorAll(".copy-btn").forEach(btn => {
        btn.addEventListener("click", () => { const text = document.getElementById(btn.dataset.copy)?.innerText; if(text) { navigator.clipboard.writeText(text); alert("Copied!"); } });
      });
      document.getElementById("doneExisting")?.addEventListener("click", () => { currentCard = 6; render(); });
      document.getElementById("backExisting")?.addEventListener("click", () => { currentCard = 4; render(); });
    }
    if (currentCard === 6 && userData.accessType === "free") {
      document.getElementById("submitDeposit")?.addEventListener("click", async () => {
        const brokerUsed = document.getElementById("brokerUsed")?.value;
        const acc = document.getElementById("accountNumber")?.value.trim();
        const deposit = document.getElementById("depositAmount")?.value.trim();
        const exp = document.getElementById("experience")?.value;
        if (!brokerUsed || !acc || !deposit || !exp) { alert("Complete all fields."); return; }
        const depositNum = parseFloat(deposit);
        if (isNaN(depositNum) || depositNum < 30) { alert("Minimum deposit of at least $30 USD is required to qualify for VIP access."); return; }
        userData.depositInfo = { brokerUsed, accountNumber: acc, depositAmount: deposit, experience: exp };
        await submitToGoogleSheets();
        currentCard = 7; render();
      });
      document.getElementById("backDeposit")?.addEventListener("click", () => { currentCard--; render(); });
    }
    if (currentCard === 7 && userData.accessType === "free") {
      document.getElementById("whatsappBtn")?.addEventListener("click", (e) => { window.open(`https://wa.me/264815562858?text=${e.currentTarget.dataset.msg}`, "_blank"); });
      document.getElementById("backFinal")?.addEventListener("click", () => { currentCard--; render(); });
    }
    if (currentCard === 3 && userData.accessType === "paid") {
      document.querySelectorAll(".plan-select").forEach(btn => {
        btn.addEventListener("click", () => {
          userData.selectedPlan = btn.dataset.plan;
          userData.selectedPlanPrice = btn.dataset.price;
          userData.selectedPlanUrl = btn.dataset.url;
          currentCard = 4; render();
        });
      });
      document.getElementById("backPlan")?.addEventListener("click", () => { currentCard = 2; render(); });
    }
    if (currentCard === 4 && userData.accessType === "paid") {
      document.querySelectorAll(".copy-crypto").forEach(btn => {
        btn.addEventListener("click", () => { navigator.clipboard.writeText(btn.dataset.address); alert("Address copied!"); });
      });
      document.getElementById("paypalBtn")?.addEventListener("click", () => { if(userData.selectedPlanUrl) window.open(userData.selectedPlanUrl, "_blank"); });
      document.getElementById("requestBankBtn")?.addEventListener("click", () => {
        const msg = `Hello WinaX VIP Club, I would like to request local Namibia banking details for VIP payment.%0A%0ASelected Plan: ${userData.selectedPlan}%0AName: ${userData.name}%0AWhatsApp: ${userData.whatsapp}`;
        window.open(`https://wa.me/264815562858?text=${msg}`, "_blank");
      });
      document.getElementById("backPayment")?.addEventListener("click", () => { currentCard--; render(); });
      document.getElementById("alreadyPaidBtn")?.addEventListener("click", async () => { await submitToGoogleSheets(); currentCard = 5; render(); });
    }
    if (currentCard === 5 && userData.accessType === "paid") {
      document.getElementById("whatsappPaidBtn")?.addEventListener("click", (e) => { window.open(`https://wa.me/264815562858?text=${e.currentTarget.dataset.msg}`, "_blank"); });
      document.getElementById("backPaidFinal")?.addEventListener("click", () => { currentCard--; render(); });
    }
  }

  // ========== CARD TEMPLATES ==========
  function renderWelcome() { return `<div class="card"><h1>🏆 WinaX VIP Club</h1><div class="gold-badge">100% Free. No Hidden Costs!</div><div class="subtitle">Accurate Trading Signals For Serious Traders</div><p>Register under our trusted brokers and follow our signals 24/7. Get guidance, resources and risk management support.</p><button class="btn btn-primary" id="startBtn">Start Free Registration →</button></div>`; }
  function renderUserInfo() { return `<div class="card"><h2>📋 Your Identity</h2><input type="text" id="fullName" placeholder="Full Name" value="${escapeHtml(userData.name)}"><input type="tel" id="whatsappNum" placeholder="WhatsApp (Example: +264812345678)" value="${escapeHtml(userData.whatsapp)}"><p class="text-secondary" style="font-size:0.8rem;">Enter your details to receive a Free Trading Robot and VIP onboarding support.</p><button class="btn btn-primary" id="continueInfoBtn">Continue</button><div class="back-link" id="backInfo">← Back</div></div>`; }
  function renderAccessType() { return `<div class="card"><h2>Choose Your Access Type</h2><div class="broker-card"><strong>🎁 FREE Lifetime Access</strong><p>Register under our broker partner links. We earn a small commission from the broker at no extra cost to you. Your trades, spreads and account conditions are NOT affected. You pay us ZERO for lifetime access.</p><button class="btn btn-primary" id="freeAccessBtn">Continue with Free Access</button></div><div class="broker-card" style="margin-top:1rem;"><strong>💎 PAID Access</strong><p>Choose this option if you prefer not to register under our broker links. You can pay directly and still receive VIP signals and support.</p><button class="btn btn-primary" id="paidAccessBtn">Continue with Paid Access</button></div><div class="back-link" id="backAccess">← Back</div></div>`; }
  function renderInterests() { const interests = ["Forex (EURUSD, GBPUSD, USDJPY)", "Gold", "NAS100 & US30", "Crypto (Bitcoin)", "Deriv Synthetic Indices (Volatility, Boom & Crash)", "Weltrade Synthetic Indices (FX Vol 20, GainX 600)"]; let opts = ""; interests.forEach(i => { const sel = userData.selectedInterests.includes(i); opts += `<div class="clickable-option interest-option ${sel ? 'selected' : ''}" data-value="${escapeHtml(i)}">${i}</div>`; }); return `<div class="card"><h2>📊 What do you want to trade?</h2><div class="option-grid">${opts}</div><button class="btn btn-primary" id="continueInterestsBtn">Continue</button><div class="back-link" id="backInterests">← Back</div></div>`; }
  function renderBrokerSelection() { const { brokers, message } = getRecommendedBrokers(); let html = `<div class="info-note"><p>${message}</p><p class="text-gold" style="font-size:0.8rem; margin-top:0.5rem;">✅ Fully regulated | ✅ Your funds are yours | ✅ Withdraw anytime</p></div>`; for (const id of brokers) { const b = BROKERS[id]; html += `<div class="broker-card"><strong>${b.name}</strong><br><span>${b.desc}</span><div class="flex-btns"><button class="btn btn-primary broker-reg" data-broker="${id}" data-link="${b.link}">📌 Register New ${b.name} Account</button><button class="btn btn-secondary broker-existing" data-broker="${id}">✅ I Already Have a ${b.name} Account</button></div></div>`; } html += `<div class="back-link" id="backBroker">← Back</div>`; return `<div class="card">${html}</div>`; }
  function renderNewAccountConfirmation() { const b = BROKERS[userData.brokerChoice]; return `<div class="card"><h2>✅ ${b.name} Registration Opened</h2><p>A new tab has been opened for you to create your ${b.name} account.</p><p class="text-gold" style="margin: 1rem 0;">Complete your account creation, then deposit <strong>at least $30</strong> (minimum) to qualify for lifetime VIP access.</p><button class="btn btn-primary" id="newAccountContinue">✓ I Have Created My Account and Deposited at Least $30</button><div class="back-link" id="backNewAccount">← Back</div></div>`; }
  function renderExistingInstructions() { const b = BROKERS[userData.brokerChoice]; if(!b) return `<div class="card">Error</div>`; const copyContent = b.existingType === "code" ? b.existingCode : b.link; return `<div class="card"><h2>🔁 ${b.name} - Existing Account</h2><p>${b.instructions}</p><div class="copy-box"><span id="copyText">${copyContent}</span><button class="copy-btn" data-copy="copyText">Copy ${b.existingType === "code" ? "Code" : "Link"}</button></div><button class="btn btn-primary" id="doneExisting">✓ I Am Done With The Process</button><div class="back-link" id="backExisting">← Back</div></div>`; }
  function renderDepositForm() { return `<div class="card"><h2>💰 Account Details</h2><p>Deposit <strong class="text-gold">at least $30 (minimum)</strong> to qualify for VIP access. You can deposit more.</p><select id="brokerUsed"><option value="">Select Broker</option><option>Deriv</option><option>XM Global</option><option>Exness</option><option>Weltrade</option></select><input id="accountNumber" placeholder="MT4/MT5 or Trading Account Number"><input id="depositAmount" placeholder="Deposit Amount (USD) - Minimum $30" type="number" step="1"><select id="experience"><option>Beginner</option><option>Less than 1 year</option><option>1-2 years</option><option>3-5 years</option><option>More than 5 years</option></select><button class="btn btn-primary" id="submitDeposit">Submit Registration</button><div class="back-link" id="backDeposit">← Back</div></div>`; }
  function renderFinalScreen() { const msg = `Hello WinaX VIP Club, I have completed my registration.%0A%0AName: ${userData.name}%0AWhatsApp: ${userData.whatsapp}%0AInterests: ${userData.selectedInterests.join(", ")}%0ABroker: ${userData.depositInfo.brokerUsed}%0AAccount: ${userData.depositInfo.accountNumber}%0ADeposit: $${userData.depositInfo.depositAmount}%0AExperience: ${userData.depositInfo.experience}%0A%0AI confirm I registered under the IB partnership link. Ready to submit my screenshot.`; return `<div class="card"><h2>✅ Registration Received</h2><p>Take a screenshot of your trading account showing account number, deposit (minimum $30), and broker name.</p><button class="btn btn-primary" id="whatsappBtn" data-msg="${msg}">📱 Submit Screenshot on WhatsApp</button><div class="back-link" id="backFinal">← Back</div></div>`; }
  
  function renderPlanSelection() { 
    let html = `<h2>💰 Select Your VIP Plan</h2><p class="text-secondary" style="margin-bottom: 1rem;">All plans are valid for <strong class="text-gold">4 months</strong> from payment date.</p>`;
    for (const [key, plan] of Object.entries(PLANS)) { 
      html += `<div class="plan-card">
        <strong>${plan.name} <span class="price-duration">${plan.price} / ${plan.duration}</span></strong>
        <ul class="plan-benefits">`;
      plan.benefits.forEach(b => { html += `<li>✓ ${b}</li>`; });
      html += `</ul><div class="flex-btns"><button class="btn btn-primary plan-select" data-plan="${plan.name}" data-price="${plan.price}" data-url="${plan.url}">Select ${plan.name}</button></div></div>`;
    } 
    html += `<div class="back-link" id="backPlan">← Back</div>`; 
    return `<div class="card">${html}</div>`; 
  }
  
  function renderPaymentMethods() { return `<div class="card"><h2>💳 Payment Methods</h2><p>Selected: <strong class="text-gold">${userData.selectedPlan}</strong> (${userData.selectedPlanPrice} for 4 months)</p><div class="info-note"><strong class="text-gold">PayPal</strong><button class="btn btn-primary" id="paypalBtn" style="margin-top:0.5rem;">Pay with PayPal →</button></div><div class="info-note"><strong class="text-gold">💎 Crypto Payments</strong><div class="copy-box"><span>USDT (TRC20): ${CRYPTO.usdt}</span><button class="copy-crypto copy-btn" data-address="${CRYPTO.usdt}">Copy</button></div><div class="copy-box"><span>Bitcoin: ${CRYPTO.btc}</span><button class="copy-crypto copy-btn" data-address="${CRYPTO.btc}">Copy</button></div><div class="copy-box"><span>Ethereum (ERC20): ${CRYPTO.eth}</span><button class="copy-crypto copy-btn" data-address="${CRYPTO.eth}">Copy</button></div></div><div class="info-note"><strong class="text-gold">🏦 Local Namibia Bank Transfer</strong><p>Prefer local Namibian bank transfer? Request details via WhatsApp.</p><button class="btn btn-secondary" id="requestBankBtn">Request Local Banking Details</button></div><button class="btn btn-primary" id="alreadyPaidBtn" style="margin-top:1rem;">✓ I Have Completed Payment</button><div class="back-link" id="backPayment">← Back</div></div>`; }
  
  function renderPaidFinalScreen() { const msg = `Hello WinaX VIP Club, I have completed my PAID registration.%0A%0AName: ${userData.name}%0AWhatsApp: ${userData.whatsapp}%0ASelected Plan: ${userData.selectedPlan} (4 months)%0A%0AI am ready to submit my payment proof for activation.`; return `<div class="card"><h2>✅ Payment Submitted</h2><p>After completing payment, send proof on WhatsApp to activate access.</p><button class="btn btn-primary" id="whatsappPaidBtn" data-msg="${msg}">📱 Submit Proof on WhatsApp</button><div class="back-link" id="backPaidFinal">← Back</div></div>`; }
  
  function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

  function initParticles() { for (let i = 0; i < 12; i++) { let p = document.createElement("div"); p.classList.add("particle"); let s = Math.random() * 120 + 40; p.style.width = s + "px"; p.style.height = s + "px"; p.style.left = Math.random() * 100 + "%"; p.style.top = Math.random() * 100 + "%"; p.style.animationDelay = Math.random() * 15 + "s"; p.style.animationDuration = (Math.random() * 15 + 10) + "s"; document.getElementById("particles").appendChild(p); } }

  loadProgress(); initParticles(); render();
  document.getElementById("resetAllBtn")?.addEventListener("click", resetAll);
</script>
</body>
